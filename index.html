<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peanut Matcher 🥜</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥜%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f2;--bg4:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#86868b;
  --accent:#d4891a;--accent-dim:#b86a12;--accent-light:#fdf3e3;
  --ok:#34c759;--ok-light:#edfaf1;
  --danger:#ff3b30;--danger-light:#fff0ef;
  --warn:#ff9500;--warn-light:#fff8ee;
  --info:#0071e3;--info-light:#e8f2fd;
  --font:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 20px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.logo-icon{font-size:28px;margin-bottom:6px;}
.logo-text{font-size:17px;font-weight:600;letter-spacing:-0.4px;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.nav{padding:10px 0;flex:1;}
.nav-section{padding:0 10px;}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.5px;color:var(--text3);padding:10px 10px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;}
.nav-item:hover{background:var(--bg3);}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item .icon{width:16px;text-align:center;font-size:13px;}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);}
.sheet-status{font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:6px;margin-top:6px;}
.sheet-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--ok);}
.sheet-dot.err{background:var(--danger);}
.sheet-dot.loading{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.auth-btn{margin-top:8px;width:100%;padding:7px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font);}
.auth-btn:hover{background:var(--bg4);}
.auth-btn.connected{border-color:var(--ok);color:var(--ok);background:var(--ok-light);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:5;}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2);color:var(--text2);box-shadow:var(--shadow);}
.btn:hover{background:var(--bg3);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-dim);}
.content{padding:24px;flex:1;}
.oferta-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:24px;margin-bottom:24px;box-shadow:var(--shadow);}
.oferta-title{font-size:16px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.oferta-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:block;}
.form-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.chip-group{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.slider-wrap{padding:8px 4px 4px;}
.slider-track-wrap{position:relative;height:6px;background:var(--bg4);border-radius:3px;margin:0 10px;}
.slider-fill{position:absolute;height:100%;background:var(--accent);border-radius:3px;pointer-events:none;}
.slider-input{position:absolute;width:100%;height:100%;top:0;left:0;appearance:none;-webkit-appearance:none;background:transparent;pointer-events:none;margin:0;}
.slider-input::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.15);cursor:pointer;pointer-events:all;transition:box-shadow .15s;}
.slider-input::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(212,137,26,.15);}
.slider-input::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;pointer-events:all;}
.slider-values{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.slider-val-badge{background:var(--accent);color:#fff;font-family:var(--mono);font-size:13px;font-weight:600;padding:5px 14px;border-radius:20px;}
.slider-val-sep{color:var(--text3);font-size:12px;}
.toggle-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-lg);border:2px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;background:var(--bg3);margin-top:12px;}
.toggle-row.split-active{border-color:var(--text);background:var(--bg4);}
.toggle-row.eu-active{border-color:var(--info);background:var(--info-light);}
.toggle-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:var(--bg2);}
.toggle-row.split-active .toggle-check{background:var(--text);border-color:var(--text);}
.toggle-row.eu-active .toggle-check{background:var(--info);border-color:var(--info);}
.toggle-label-main{font-size:13px;font-weight:500;}
.toggle-label-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-search{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-lg);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-search:hover{background:var(--accent-dim);}
.btn-reset{padding:11px 18px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:var(--radius-lg);font-size:13px;font-weight:500;cursor:pointer;}
.btn-reset:hover{background:var(--bg3);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-1px;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.results-title{font-size:14px;font-weight:600;}
.results-pills{display:flex;gap:5px;flex-wrap:wrap;}
.rpill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:20px;border:1px solid;}
.rpill.accent{background:var(--accent-light);color:var(--accent);border-color:rgba(212,137,26,.2);}
.rpill.dark{background:var(--text);color:#fff;border-color:var(--text);}
.rpill.eu{background:var(--info-light);color:var(--info);border-color:rgba(0,113,227,.15);}
.rpill.muted{background:var(--bg3);color:var(--text3);border-color:var(--border);}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;box-shadow:var(--shadow);}
.filter-bar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--mono);font-size:11px;padding:5px 10px;outline:none;cursor:pointer;}
.fsel.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.filter-reset{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--danger);color:var(--danger);background:var(--danger-light);cursor:pointer;font-family:var(--font);}
.filter-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto;}
.match-list{display:flex;flex-direction:column;gap:8px;}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;transition:all .15s;box-shadow:var(--shadow);animation:fadeIn .2s ease both;}
.match-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);border-color:var(--border2);}
.match-card.has-fu{border-color:rgba(245,158,11,.3);background:linear-gradient(135deg,#ffffff,#fffdf7);}
.match-card.has-fu:hover{border-color:rgba(245,158,11,.5);}
.match-top{display:flex;align-items:center;gap:14px;}
.match-avatar{width:38px;height:38px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;}
.match-avatar.fu{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;}
.match-body{flex:1;min-width:0;}
.match-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.match-name{font-size:14px;font-weight:600;}
.match-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.match-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.mtag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:500;}
.mtag.type{background:var(--accent-light);color:var(--accent);border:1px solid rgba(212,137,26,.2);}
.mtag.size{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.mtag.region{background:var(--info-light);color:var(--info);border:1px solid rgba(0,113,227,.15);}
.mtag.country{background:#f5f0ff;color:#6e3ab0;border:1px solid rgba(110,58,176,.15);}
.match-check{font-size:20px;color:var(--ok);flex-shrink:0;}
.edit-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.edit-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.fu-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}
.fu-panel{margin-top:10px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:10px 12px;}
.fu-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fu-panel-title{font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.4px;}
.fu-panel-count{font-size:10px;font-family:var(--mono);color:#b45309;background:rgba(180,83,9,.1);padding:1px 7px;border-radius:10px;}
.fu-record{padding:7px 0;border-bottom:1px solid rgba(245,158,11,.15);display:flex;align-items:flex-start;gap:8px;}
.fu-record:last-child{border-bottom:none;padding-bottom:0;}
.fu-record-body{flex:1;min-width:0;}
.fu-date{font-size:10px;font-family:var(--mono);color:#b45309;font-weight:600;margin-bottom:4px;}
.fu-details{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.futag{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:10px;font-weight:500;}
.futag.size{background:rgba(180,83,9,.1);color:#92400e;}
.futag.type{background:rgba(217,119,6,.15);color:#78350f;}
.futag.price{background:rgba(16,185,129,.1);color:#065f46;}
.futag.tns{background:rgba(59,130,246,.1);color:#1e40af;}
.futag.supplier{background:rgba(139,92,246,.1);color:#5b21b6;}
.fu-comment{font-size:11px;color:#78350f;margin-top:6px;line-height:1.4;font-style:italic;}
.fu-edit-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(180,83,9,.2);background:rgba(180,83,9,.06);color:#b45309;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.fu-edit-btn:hover{background:rgba(180,83,9,.15);}
.section-divider{display:flex;align-items:center;gap:10px;margin:12px 0 8px;}
.section-divider-label{font-size:11px;font-weight:700;font-family:var(--mono);white-space:nowrap;}
.section-divider-line{flex:1;height:1px;background:var(--border);}
.empty-state{padding:60px 24px;text-align:center;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-title{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;}
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:12px;gap:10px;}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.info-banner{background:var(--accent-light);border:1px solid rgba(212,137,26,.2);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--accent-dim);margin-bottom:24px;line-height:1.6;}
.config-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.config-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.config-desc{font-size:11px;color:var(--text3);margin-bottom:14px;}
.config-field{margin-bottom:10px;}
.config-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.config-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;transition:border-color .15s;}
.config-input:focus{border-color:var(--accent);background:var(--bg2);}
.config-save{display:flex;justify-content:flex-end;margin-top:10px;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none !important;pointer-events:none;}
.modal{background:var(--bg2);border-radius:var(--radius-xl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg3);color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.modal-close:hover{background:var(--bg4);}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2);}
.mfield{margin-bottom:14px;}
.mfield-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.mfield-opt{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;}
.minput{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;}
.minput:focus{border-color:var(--accent);background:var(--bg2);}
.mselect{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;cursor:pointer;appearance:none;}
.mselect:focus{border-color:var(--accent);}
.mtextarea{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;resize:vertical;min-height:80px;transition:border-color .15s;}
.mtextarea:focus{border-color:var(--accent);background:var(--bg2);}
.mform-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.company-field{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--radius) var(--radius);box-shadow:var(--shadow-lg);z-index:10;max-height:200px;overflow-y:auto;}
.autocomplete-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background .1s;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover,.autocomplete-item.active{background:var(--accent-light);color:var(--accent);}
.autocomplete-item .ac-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.not-found-banner{background:var(--warn-light);border:1px solid rgba(255,149,0,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:#92400e;margin-top:6px;}

/* ── EMPRESAS VIEW ── */
.empresa-search-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:20px;margin-bottom:20px;box-shadow:var(--shadow);}
.empresa-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
.empresa-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.empresa-name{font-size:15px;font-weight:700;}
.empresa-meta{font-size:12px;color:var(--text3);margin-top:2px;}

/* PROGRESS / TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-weight:500;font-size:12px;z-index:999;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow-lg);opacity:0;}
.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#e2a832);z-index:9999;transform-origin:left;transform:scaleX(0);pointer-events:none;}
.progress-bar.active{animation:progress 1.5s ease-in-out infinite;}
@keyframes progress{0%{transform:scaleX(0);opacity:1;}60%{transform:scaleX(.7);opacity:1;}100%{transform:scaleX(1);opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mobile-toggle{display:none;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:15px;}
.overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.35);}

/* ── MOBILE ── */
@media(max-width:768px){
  .mobile-toggle{display:flex;}

<script>
// CONFIG
const CFG_KEY='peanut_matcher_cfg';
let cfg=Object.assign({clientId:'',sheetId:'10KFlKkOIKz-l6_wXHiHM_9WL-u97AtDM3MtXmHNI5OQ',sheetName:'Sheet1'},JSON.parse(localStorage.getItem(CFG_KEY)||'{}'));
const COL={CLIENT:1,REGION:2,COUNTRY:3,COMPANY:4,SIZE:28,TYPE:29};
const EU_REGIONS=['europe','europa','eu','emea','european union'];
function isEU(v){return EU_REGIONS.includes((v||'').toLowerCase().trim());}

const TYPE_MAP={'raw':['Raw'],'crudo':['Raw'],'blanched':['Blanched'],'blancheados':['Blanched'],'blanched g1/g2':['Blanched'],'horneado':['Roasted'],'tostado':['Roasted'],'blancheado / raw':['Blanched','Raw'],'blanched - raw':['Blanched','Raw'],'blanched / raw':['Blanched','Raw'],'raw - blanched':['Blanched','Raw'],'raw y blanched':['Blanched','Raw'],'crudo y bl':['Blanched','Raw'],'crudo y blanched bf':['Blanched','Raw'],'blanceado, crudo y con cascara':['Blanched','Raw'],'blancheado, crudo y con cascara':['Blanched','Raw'],'tostado, crudo y blanhceado todo':['Blanched','Raw','Roasted'],'tostado, crudo y blanheado todo':['Blanched','Raw','Roasted']};
function getCanonicalTypes(raw){const k=(raw||'').toLowerCase().trim();if(TYPE_MAP[k])return TYPE_MAP[k];const t=[];if(k.includes('raw')||k.includes('crudo'))t.push('Raw');if(k.includes('blanch')||k.includes('blanc'))t.push('Blanched');if(k.includes('roast')||k.includes('tost')||k.includes('horn'))t.push('Roasted');return t.length?[...new Set(t)]:[];}

function parseSizeValue(raw){const s=(raw||'').toLowerCase();const hasSplit=s.includes('split');const hasAny=s.includes('any')||s.includes('todo')||s.includes('cualquier')||s.includes('todos')||s.includes('all')||s.includes('calibres medianos')||s.includes('principalmente')||s.includes('runner')||s.includes('wholes')||s.includes('sortex')||s.includes('chopped')||s.includes('pasta')||s.includes('small');const nums=[];const ms=s.match(/[0-9]+/g);if(ms)ms.forEach(function(n){var v=parseInt(n);if(v>=20&&v<=120)nums.push(v);});return{nums,hasSplit,hasAny};}
function sizeMatches(raw,minV,maxV,withSplit){var p=parseSizeValue(raw);if(p.hasAny)return true;if(p.hasSplit&&withSplit)return true;return p.nums.some(function(n){return n>=minV&&n<=maxV;});}

function normalizeFUType(raw){var s=(raw||'').toLowerCase().trim();if(!s)return '';if(s.includes('roast')||s.includes('tost')||s.includes('horn'))return 'Roasted';if(s.includes('blanch')||s.includes('blanc'))return 'Blanched';if(s.includes('raw')||s.includes('crudo'))return 'Raw';return raw;}
function normalizeFUSize(raw){var s=(raw||'').toLowerCase().trim();if(!s)return '';var AK=['all','todos','any','small sizes','wholes','wholes and splits','wholes & splits','sortex','sortex reject','chopped','pasta','2 - 4 mm','2-4mm'];for(var i=0;i<AK.length;i++){if(s===AK[i]||s.includes(AK[i]))return 'Any';}var nums=[];var ms=s.match(/[0-9]+/g);if(ms)ms.forEach(function(n){var v=parseInt(n);if(v>=20&&v<=120)nums.push(v);});var hasSplit=s.includes('split');var KNOWN=[[28,32],[30,36],[30,37],[32,38],[34,38],[35,40],[38,42],[40,50],[50,60],[60,70],[70,80],[80,100],[70,100]];var found=[];KNOWN.forEach(function(pair){if(nums.indexOf(pair[0])>=0&&nums.indexOf(pair[1])>=0)found.push(pair[0]+'/'+pair[1]);});var parts=found.length?found:(nums.length?[nums.sort(function(a,b){return a-b;})[0]+'']:[]);if(hasSplit)parts.push('Split');return parts.length?parts.join(' · '):raw;}

function similarity(a,b){a=(a||'').toLowerCase().trim().replace(/[^a-z0-9]/g,' ').replace(/  +/g,' ');b=(b||'').toLowerCase().trim().replace(/[^a-z0-9]/g,' ').replace(/  +/g,' ');if(a===b)return 1;if(!a||!b)return 0;var m=a.length,n=b.length,dp=[],i,j;for(i=0;i<=m;i++){dp[i]=[];for(j=0;j<=n;j++)dp[i][j]=i===0?j:j===0?i:0;}for(i=1;i<=m;i++)for(j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return 1-dp[m][n]/Math.max(m,n);}
function findFollowUp(company){
  if(!followUpRows.length||!company)return[];
  var cLow=company.toLowerCase().trim();
  return followUpRows.filter(function(row){
    var fuName=(row[1]||'').trim().toLowerCase();
    // Exact substring match in either direction
    if(fuName.includes(cLow)||cLow.includes(fuName)) return true;
    // Similarity threshold lowered to 0.7
    return similarity(cLow,fuName)>=0.7;
  });
}

// Get all company names from Database for autocomplete
function getCompanyNames(){return [...new Set(allRows.map(function(r){return(r[COL.COMPANY]||r[COL.CLIENT]||'').trim();}).filter(Boolean))].sort();}

// STATE
var accessToken=null,tokenClient=null,allRows=[],followUpRows=[];
var currentView='matcher',lastSearch=null;
var resultFilters={region:'',country:'',type:''};
var selectedTypes=new Set(),aptoEuropa=false,incluirSplit=false;
var rangeMin=38,rangeMax=50,SLIDER_MIN=30,SLIDER_MAX=100;

var fuModalMode='new'; // 'new' or 'edit'

// OAUTH — scope now includes write
var SCOPES='https://www.googleapis.com/auth/spreadsheets';
function initGoogleAuth(){if(!cfg.clientId)return;if(typeof google==='undefined'||!google.accounts||!google.accounts.oauth2){setTimeout(initGoogleAuth,500);return;}tokenClient=google.accounts.oauth2.initTokenClient({client_id:cfg.clientId,scope:SCOPES,callback:function(resp){if(resp.error){console.error(resp);return;}accessToken=resp.access_token;updateAuthUI(true);loadSheetData();}});}
function handleAuth(){if(accessToken){google.accounts.oauth2.revoke(accessToken,function(){accessToken=null;allRows=[];followUpRows=[];updateAuthUI(false);setSheetStatus('err','Desconectado');});}else{if(!cfg.clientId){showView('config');showToast('Configurá el Client ID primero');return;}if(!tokenClient){initGoogleAuth();setTimeout(function(){if(tokenClient)tokenClient.requestAccessToken();},600);return;}tokenClient.requestAccessToken();}}
function updateAuthUI(connected){var btn=document.getElementById('auth-btn'),txt=document.getElementById('auth-status-text');if(connected){btn.textContent='Desconectar Google';btn.className='auth-btn connected';txt.textContent='● Conectado';txt.style.color='var(--ok)';}else{btn.textContent='Conectar con Google';btn.className='auth-btn';txt.textContent='';}if(currentView==='config')renderConfig();}

// DATA
async function loadSheetData(){
  if(!accessToken){setSheetStatus('err','Sin autenticar');return;}
  setSheetStatus('loading','Cargando datos...');showProgress();
  try{
    var range=encodeURIComponent(cfg.sheetName+'!A2:AL2000');
    var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+range,{headers:{Authorization:'Bearer '+accessToken}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    allRows=(data.values||[]).filter(function(row){return row[COL.TYPE]||row[COL.SIZE]||row[COL.CLIENT]||row[COL.COMPANY];});
    try{
      var fuRange=encodeURIComponent('Follow up!A2:O2000');
      var fuR=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+fuRange,{headers:{Authorization:'Bearer '+accessToken}});
      if(fuR.ok){var fuData=await fuR.json();followUpRows=(fuData.values||[]).filter(function(row){return row[1];});}
    }catch(e){console.warn('Follow up:',e);}
    setSheetStatus('ok',allRows.length+' clientes · '+followUpRows.length+' follow ups');
    document.getElementById('last-sync').textContent='Sync '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    hideProgress();
    if(currentView==='matcher')renderMatcher();
    else if(currentView==='empresas')renderEmpresas();
  }catch(e){setSheetStatus('err','Error al cargar');hideProgress();showToast('Error al conectar con el Sheet');console.error(e);}
}
function setSheetStatus(state,text){document.getElementById('sheet-dot').className='sheet-dot'+(state==='err'?' err':state==='loading'?' loading':'');document.getElementById('sheet-status-text').textContent=text;}

// WRITE TO SHEET — append row to Follow Up
async function appendFURow(rowData){
  // rowData is array of 15 elements: A=date, B=company, C=contact, D=size, E=type, F=origin, G=packaging, H=tns_label, I=tns, J=price, K=port, L=country, M=shipment, N=supplier, O=comment
  var range=encodeURIComponent('Follow up!A:O');
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+range+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
  var r=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:[rowData]})});
  return r.ok;
}

// UPDATE existing FU row
async function updateFURow(sheetRowNum,rowData){
  var range=encodeURIComponent('Follow up!A'+sheetRowNum+':O'+sheetRowNum);
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+range+'?valueInputOption=USER_ENTERED';
  var r=await fetch(url,{method:'PUT',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({values:[rowData]})});
  return r.ok;
}

// TODAY as DD/MM/YYYY
function todayStr(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}

function onCompanyInputIfNotPrefilled(){
  var inp=document.getElementById('fu-company');
  // If this is the first trigger after prefill, skip it
  if(inp.dataset.fromDb==='true'){return;}
  onCompanyInput();

function onCompanyInput(){
  document.getElementById('fu-company').dataset.fromDb='false';
  var val=document.getElementById('fu-company').value.trim();
  var notFound=document.getElementById('ac-notfound');
  acSelectedIndex=-1;
  if(val.length<2){document.getElementById('ac-list').classList.add('hidden');return;}
  var names=getCompanyNames();
  var matches=names.filter(function(n){return n.toLowerCase().includes(val.toLowerCase())||similarity(n.toLowerCase(),val.toLowerCase())>=0.5;}).slice(0,8);
  if(!matches.length){
    document.getElementById('ac-list').classList.add('hidden');
    // Only warn if manually typed (not prefilled/selected from DB, not disabled)
    var inp=document.getElementById('fu-company');
    var isPrefilled=inp.dataset.fromDb==='true'||inp.disabled;
    if(!isPrefilled){
      var anyMatch=names.some(function(n){return similarity(n.toLowerCase(),val.toLowerCase())>=0.75;});
      ;
    } else {
      ;
    }
    return;
  }
  ;
  window._acNames=matches;
  var list=document.getElementById('ac-list');
  list.innerHTML=matches.map(function(n,i){
    var dbRow=allRows.find(function(r){return(r[COL.COMPANY]||r[COL.CLIENT]||'').trim()===n;});
    var sub=dbRow?[dbRow[COL.COUNTRY],dbRow[COL.REGION]].filter(Boolean).join(' · '):'';
    return '<div class="autocomplete-item" onmousedown="selectCompanyIdx('+i+')"><div>'+n+'</div>'+(sub?'<div class="ac-sub">'+sub+'</div>':'')+'</div>';
  }).join('');

}

function onCompanyKeydown(e){
  var list=document.getElementById('ac-list');
  var items=list.querySelectorAll('.autocomplete-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acSelectedIndex=Math.min(acSelectedIndex+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('active',i===acSelectedIndex);});}
  else if(e.key==='ArrowUp'){e.preventDefault();acSelectedIndex=Math.max(acSelectedIndex-1,0);items.forEach(function(el,i){el.classList.toggle('active',i===acSelectedIndex);});}
  else if(e.key==='Enter'&&acSelectedIndex>=0){e.preventDefault();selectCompanyIdx(acSelectedIndex);}
  else if(e.key==='Escape'){list.classList.add('hidden');}
}

function selectCompanyIdx(idx){
  var name=window._acNames&&window._acNames[idx];
  if(name)selectCompany(name);
}
function selectCompany(name){
  var inp=document.getElementById('fu-company');
  inp.value=name;
  inp.dataset.fromDb='true';
  document.getElementById('ac-list').classList.add('hidden');
  ;
  acSelectedIndex=-1;
}

// SAVE FU RECORD
async function saveFURecord(){
  if(!accessToken){showToast('Conectate con Google primero');return;}
  var company=document.getElementById('fu-company').value.trim();
  if(!company){showToast('Ingresá el nombre de la empresa');document.getElementById('fu-company').focus();return;}
  // Soft warning at save time if not in DB (non-blocking)
  var inDb=allRows.some(function(r){return similarity((r[COL.COMPANY]||r[COL.CLIENT]||'').trim().toLowerCase(),company.toLowerCase())>=0.8;});
  if(!inDb&&fuModalMode==='new'){
    // just log, don't block
    console.warn('Company not found in DB:',company);
  }

  var size=document.getElementById('fu-size').value.trim();
  var type=document.getElementById('fu-type').value.trim();
  var tns=document.getElementById('fu-tns').value.trim();
  var price=document.getElementById('fu-price').value.trim();
  var supplier=document.getElementById('fu-supplier').value.trim();
  var comment=document.getElementById('fu-comment').value.trim();
  var date=todayStr();

  // rowData: A=date, B=company, C='', D=size, E=type, F='', G='', H='', I=tns, J=price, K='', L='', M='', N=supplier, O=comment
  var rowData=[date,company,'',size,type,'','','',tns,price,'','','',supplier,comment];

  var btn=document.getElementById('fu-save-btn');
  btn.textContent='Guardando...';btn.disabled=true;

  var ok=false;
  if(fuModalMode==='edit'&&fuEditRowIndex!==null){
    // Sheet row = fuEditRowIndex + 2 (header on row 1, data starts row 2)
    ok=await updateFURow(fuEditRowIndex+2,rowData);
    if(ok){
      // Update local cache
      followUpRows[fuEditRowIndex]=rowData;
      showToast('✓ Follow Up actualizado');
    }
  } else {
    ok=await appendFURow(rowData);
    if(ok){
      followUpRows.push(rowData);
      showToast('✓ Follow Up guardado');
    }
  }

  btn.textContent='💾 Guardar';btn.disabled=false;

  if(ok){
    closeFUModal();
    if(currentView==='matcher'&&lastSearch){
      // Refresh match results to reflect new FU
      lastSearch.results=getMatches();
      renderResults();
    } else if(currentView==='empresas'){
      renderEmpresas();
    }
  } else {
    showToast('Error al guardar en el Sheet');
  }
}

// MATCH
function getMatches(){
  var types=[...selectedTypes].map(function(t){return t.toLowerCase();});
  var results=allRows.filter(function(row){
    if(!aptoEuropa&&isEU(row[COL.REGION]||''))return false;
    var canon=getCanonicalTypes(row[COL.TYPE]||'').map(function(t){return t.toLowerCase();});
    var typeOk=types.length===0||types.some(function(t){return canon.includes(t);});
    var dbSize=(row[COL.SIZE]||'').trim();
    var sizeOk=sizeMatches(dbSize,rangeMin,rangeMax,incluirSplit);
    // Fallback: if DB has no size, check Follow Up records for size match
    if(!sizeOk&&!dbSize){
      var co=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
      var fuRecs=findFollowUp(co);
      sizeOk=fuRecs.some(function(fuRow){
        return sizeMatches((fuRow[3]||'').trim(),rangeMin,rangeMax,incluirSplit);
      });
    }
    return typeOk&&sizeOk;
  }).map(function(row){
    var company=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
    var fuRecs=findFollowUp(company);
    var eu=isEU(row[COL.REGION]||'');
    var pri;
    if(aptoEuropa){if(eu&&fuRecs.length)pri=0;else if(fuRecs.length)pri=1;else if(eu)pri=2;else pri=3;}
    else{pri=fuRecs.length?0:1;}
    return{client:(row[COL.CLIENT]||'').trim(),region:(row[COL.REGION]||'').trim(),country:(row[COL.COUNTRY]||'').trim(),company,size:(row[COL.SIZE]||'').trim(),type:(row[COL.TYPE]||'').trim(),canonicalTypes:getCanonicalTypes(row[COL.TYPE]||''),sizeInfo:parseSizeValue(row[COL.SIZE]||''),fuRecords:fuRecs,hasFU:fuRecs.length>0,isEu:eu,priority:pri};
  });
  return results.sort(function(a,b){return a.priority-b.priority;});
}

function updateSlider(){
  var mi=document.getElementById('range-min'),ma=document.getElementById('range-max');if(!mi||!ma)return;
  var minV=parseInt(mi.value),maxV=parseInt(ma.value);if(minV>maxV){minV=maxV;mi.value=minV;}
  rangeMin=minV;rangeMax=maxV;
  var pMin=(minV-SLIDER_MIN)/(SLIDER_MAX-SLIDER_MIN)*100,pMax=(maxV-SLIDER_MIN)/(SLIDER_MAX-SLIDER_MIN)*100;
  var fill=document.getElementById('slider-fill');if(fill){fill.style.left=pMin+'%';fill.style.width=(pMax-pMin)+'%';}
  var bmi=document.getElementById('badge-min'),bma=document.getElementById('badge-max');
  if(bmi)bmi.textContent=minV;if(bma)bma.textContent=maxV;
}

// BUILD FU PANEL HTML (shared between matcher and empresas)
function buildFURecord(row, showEditBtns){
  var date=(row[0]||'').trim();
  var sz=normalizeFUSize((row[3]||'').trim());
  var ty=normalizeFUType((row[4]||'').trim());
  var tns=(row[8]||'').trim(),price=(row[9]||'').trim(),supplier=(row[13]||'').trim(),comment=(row[14]||'').trim();
  var rowIdx=followUpRows.indexOf(row);
  var editBtn=showEditBtns&&rowIdx>=0?'<span class="fu-edit-btn" onclick="openFUModal(\'\','+rowIdx+')" title="Editar">✏️</span>':'';
  return '<div class="fu-record">'+
    '<div class="fu-record-body">'+
      '<div class="fu-date">'+(date||'—')+'</div>'+
      '<div class="fu-details">'+
        (sz&&sz!=='—'?'<span class="futag size">'+sz+'</span>':'')+
        (ty&&ty!=='—'?'<span class="futag type">'+ty+'</span>':'')+
        (tns?'<span class="futag tns">'+tns+' tn</span>':'')+
        (price?'<span class="futag price">USD '+price+'</span>':'')+
        (supplier?'<span class="futag supplier">🏭 '+supplier+'</span>':'')+
      '</div>'+
      (comment?'<div class="fu-comment">"'+comment+'"</div>':'')+
    '</div>'+
    editBtn+
  '</div>';
}

function buildFUPanel(fuRecords, showEditBtns, showAll){
  var sorted=fuRecords.slice().sort(function(a,b){
    var da=new Date((a[0]||'').split('/').reverse().join('-'));
    var db=new Date((b[0]||'').split('/').reverse().join('-'));
    return db-da;
  });
  var panelId='fu-panel-'+Math.random().toString(36).slice(2,7);
  var preview=sorted.slice(0,3);
  var rest=sorted.slice(3);
  var previewHtml=preview.map(function(row){return buildFURecord(row,showEditBtns);}).join('');
  var restHtml=rest.length?rest.map(function(row){return buildFURecord(row,showEditBtns);}).join(''):'';
  var moreBtn=rest.length?
    '<div id="more-'+panelId+'" style="font-size:11px;color:#b45309;margin-top:6px;font-family:var(--mono);cursor:pointer;text-decoration:underline;" onclick="toggleFUAll(''+panelId+'')">▼ Ver '+rest.length+' registro'+(rest.length>1?'s':'')+' más</div>'+
    '<div id="rest-'+panelId+'" style="display:none;">'+restHtml+'<div style="font-size:11px;color:#b45309;margin-top:6px;font-family:var(--mono);cursor:pointer;text-decoration:underline;" onclick="toggleFUAll(''+panelId+'')">▲ Ocultar</div></div>':
    '';
  return '<div class="fu-panel">'+
    '<div class="fu-panel-header">'+
      '<span class="fu-panel-title">📋 Follow Up</span>'+
      '<span class="fu-panel-count">'+fuRecords.length+' registro'+(fuRecords.length>1?'s':'')+'</span>'+
    '</div>'+
    previewHtml+
    moreBtn+
  '</div>';
}

function toggleFUAll(panelId){
  var restEl=document.getElementById('rest-'+panelId);
  var moreEl=document.getElementById('more-'+panelId);
  if(!restEl||!moreEl)return;
  var isHidden=restEl.style.display==='none';
  restEl.style.display=isHidden?'block':'none';
  moreEl.style.display=isHidden?'none':'block';
}

      (hasFilters?'<button class="filter-reset" onclick="clearResultFilters()">✕ Limpiar</button>':'')+

              (m.region?'<span class="mtag region">'+(m.isEu?'🇪🇺 ':'')+m.region+'</span>':'')+

            '</div>'+

var empAcIdx=-1;
var empAllNames=[];

function deduplicateNames(dbNames,fuNames){
  var seen={};var result=[];
  dbNames.forEach(function(n){var k=n.toLowerCase().trim();if(!seen[k]){seen[k]=n;result.push(n);}});
  fuNames.forEach(function(n){
    var k=n.toLowerCase().trim();
    if(seen[k])return;
    var isSim=Object.keys(seen).some(function(s){return s.includes(k)||k.includes(s)||similarity(s,k)>=0.7;});
    if(!isSim){seen[k]=n;result.push(n);}
  });
  return result.sort();
}

function selectEmpresaByIndex(idx){
  var name=empAllNames[idx];
  if(!name)return;
  selectEmpresa(name);
}

function onEmpSearch(val){
  empresasQuery=val;empAcIdx=-1;
  var list=document.getElementById('emp-ac-list');
  if(val.length<2){list.classList.add('hidden');document.getElementById('emp-results').innerHTML='';return;}
  var dbNames=getCompanyNames();
  var fuNames=[...new Set(followUpRows.map(function(r){return(r[1]||'').trim();}).filter(Boolean))];
  empAllNames=deduplicateNames(dbNames,fuNames);
  var valLow=val.toLowerCase();
  var matches=empAllNames.filter(function(n){
    return n.toLowerCase().includes(valLow)||similarity(n.toLowerCase(),valLow)>=0.8;
  }).slice(0,10);
  if(!matches.length){list.classList.add('hidden');renderEmpresaResults(val);return;}
  list.innerHTML=matches.map(function(n){
    var dbRow=allRows.find(function(r){return(r[COL.COMPANY]||r[COL.CLIENT]||'').trim().toLowerCase()===n.toLowerCase();});
    var sub=dbRow?[dbRow[COL.COUNTRY],dbRow[COL.REGION]].filter(Boolean).join(' · '):'Solo en Follow Up';
    var idx=empAllNames.indexOf(n);
    return '<div class="autocomplete-item" onmousedown="selectEmpresaByIndex('+idx+')"><div>'+n+'</div><div class="ac-sub">'+sub+'</div></div>';
  }).join('');
  list.classList.remove('hidden');
}

function onEmpKeydown(e){
  var list=document.getElementById('emp-ac-list');
  var items=list.querySelectorAll('.autocomplete-item');
  if(e.key==='ArrowDown'){e.preventDefault();empAcIdx=Math.min(empAcIdx+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('active',i===empAcIdx);});}
  else if(e.key==='ArrowUp'){e.preventDefault();empAcIdx=Math.max(empAcIdx-1,0);items.forEach(function(el,i){el.classList.toggle('active',i===empAcIdx);});}
  else if(e.key==='Enter'){e.preventDefault();if(empAcIdx>=0)selectEmpresa(items[empAcIdx].dataset.val);else renderEmpresaResults(document.getElementById('emp-search').value);}
  else if(e.key==='Escape'){list.classList.add('hidden');}
}

function selectEmpresa(name){
  document.getElementById('emp-search').value=name;
  empresasQuery=name;
  document.getElementById('emp-ac-list').classList.add('hidden');
  renderEmpresaResults(name);
}

function renderEmpresaResults(query){
  var area=document.getElementById('emp-results');if(!area)return;
  if(!query){area.innerHTML='';return;}

  // Find in DB
  var dbMatches=allRows.filter(function(r){
    var n=(r[COL.COMPANY]||r[COL.CLIENT]||'').trim();
    return n.toLowerCase().includes(query.toLowerCase())||similarity(n,query)>=0.6;
  });

  // Find FU records — case-insensitive + 80% similarity
  var qLow=query.toLowerCase();
  var fuMatches=followUpRows.filter(function(r){
    var n=(r[1]||'').trim().toLowerCase();
    return n.includes(qLow)||qLow.includes(n)||similarity(n,qLow)>=0.7;
  });

  if(!dbMatches.length&&!fuMatches.length){
    area.innerHTML='<div class="empty-state"><div class="empty-icon">🏢</div><div class="empty-title">Sin resultados</div><div class="empty-sub">No se encontró "'+query+'" en Database ni en Follow Up.</div></div>';
    return;
  }

  // Group FU by canonical key (lowercase) so Stockinvest & STOCKINVEST merge
  var fuByKey={};
  fuMatches.forEach(function(r){
    var n=(r[1]||'').trim();
    var k=n.toLowerCase();
    if(!fuByKey[k])fuByKey[k]=[];
    fuByKey[k].push(r);
  });
  // For display, prefer DB name; fallback to FU name
  var fuByCompany={};
  Object.keys(fuByKey).forEach(function(k){
    var dbRow=dbMatches.find(function(r){return(r[COL.COMPANY]||r[COL.CLIENT]||'').trim().toLowerCase()===k;});
    var displayName=dbRow?(dbRow[COL.COMPANY]||dbRow[COL.CLIENT]||'').trim():fuByKey[k][0][1].trim();
    fuByCompany[displayName]=fuByKey[k];
  });

  var html='';

  if(dbMatches.length){
    dbMatches.forEach(function(row){
      var company=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
      var meta=[row[COL.COUNTRY],row[COL.REGION]].filter(Boolean).join(' · ');
      var dbTypes=getCanonicalTypes(row[COL.TYPE]||'');
      var dbSize=(row[COL.SIZE]||'').trim();
      // Get FU for this company
      var fu=findFollowUp(company);
      var safeName=company.replace(/'/g,"\\'");

      html+='<div class="empresa-card">'+
        '<div class="empresa-card-header">'+
          '<div>'+
            '<div class="empresa-name">'+company+'</div>'+
            (meta?'<div class="empresa-meta">'+meta+'</div>':'')+
          '</div>'+
          '<button class="btn primary" style="font-size:12px;padding:6px 12px;" onclick="openFUModal(\''+safeName+'\')">+ Follow Up</button>'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;">'+
          dbTypes.map(function(t){return '<span class="mtag type">'+t+'</span>';}).join('')+
          (dbSize?'<span class="mtag size">'+dbSize+'</span>':'')+
        '</div>'+
        (fu.length?buildFUPanel(fu,true):'<div style="font-size:12px;color:var(--text3);padding:8px 0;">Sin registros de Follow Up aún.</div>')+
      '</div>';
    });
  } else if(fuMatches.length){
    // Companies only in FU
    Object.keys(fuByCompany).forEach(function(name){
      var fu=fuByCompany[name];
      var safeName=name.replace(/'/g,"\\'");
      html+='<div class="empresa-card">'+
        '<div class="empresa-card-header">'+
          '<div>'+
            '<div class="empresa-name">'+name+'</div>'+
            '<div class="empresa-meta" style="color:var(--warn);">Solo en Follow Up (no encontrado en Database)</div>'+
          '</div>'+
          '<button class="btn primary" style="font-size:12px;padding:6px 12px;" onclick="openFUModal(\''+safeName+'\')">+ Follow Up</button>'+
        '</div>'+
        buildFUPanel(fu,true)+
      '</div>';
    });
  }

  area.innerHTML=html;
}

function saveConfig(){
  cfg.clientId=document.getElementById('cfg-clientId').value.trim()||cfg.clientId;
  cfg.sheetId=document.getElementById('cfg-sheetId').value.trim()||cfg.sheetId;
  cfg.sheetName=document.getElementById('cfg-sheetName').value.trim()||cfg.sheetName;
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  initGoogleAuth();showToast('Configuración guardada');
  setTimeout(function(){showView('matcher');},800);
}

// UTILS
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(function(){t.style.opacity='0';},2800);}
function showProgress(){document.getElementById('progress-bar').classList.add('active');}
function hideProgress(){document.getElementById('progress-bar').classList.remove('active');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay-close').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay-close').classList.remove('show');}

window.onload=function(){
  if(cfg.clientId)initGoogleAuth();
  renderMatcher();
  setSheetStatus('err',cfg.clientId?'Sin autenticar':'Sin configurar');
};
