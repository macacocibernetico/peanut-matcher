<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peanut Matcher 🥜</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥜%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bg:#f5f5f7;--bg2:#fff;--bg3:#f0f0f2;--bg4:#e8e8ed;
  --border:#d2d2d7;--border2:#c7c7cc;
  --text:#1d1d1f;--text2:#424245;--text3:#86868b;
  --accent:#d4891a;--accent-dim:#b86a12;--accent-light:#fdf3e3;
  --ok:#34c759;--ok-light:#edfaf1;
  --danger:#ff3b30;--danger-light:#fff0ef;
  --warn:#ff9500;--warn-light:#fff8ee;
  --info:#0071e3;--info-light:#e8f2fd;
  --font:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--rl:14px;--rxl:18px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shl:0 4px 20px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.logo-icon{font-size:28px;margin-bottom:6px;}
.logo-text{font-size:17px;font-weight:600;letter-spacing:-.4px;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.nav{padding:10px 0;flex:1;}
.nav-sec{padding:0 10px;}
.nav-lbl{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);padding:10px 10px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;}
.nav-item:hover{background:var(--bg3);}
.nav-item.active{background:var(--accent);color:#fff;}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--ok);}
.sdot.err{background:var(--danger);}
.sdot.loading{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.stext{font-size:11px;color:var(--text3);font-family:var(--mono);}
.auth-btn{margin-top:8px;width:100%;padding:7px 12px;border-radius:var(--r);font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font);}
.auth-btn:hover{background:var(--bg4);}
.auth-btn.connected{border-color:var(--ok);color:var(--ok);background:var(--ok-light);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:5;}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2);color:var(--text2);box-shadow:var(--sh);}
.btn:hover{background:var(--bg3);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-dim);}
.content{padding:24px;flex:1;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);padding:24px;margin-bottom:24px;box-shadow:var(--sh);}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.card-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:block;}
.form-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.chip-group{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.sl-wrap{padding:8px 4px 4px;}
.sl-track{position:relative;height:6px;background:var(--bg4);border-radius:3px;margin:0 10px;}
.sl-fill{position:absolute;height:100%;background:var(--accent);border-radius:3px;pointer-events:none;}
.sl-inp{position:absolute;width:100%;height:100%;top:0;left:0;appearance:none;-webkit-appearance:none;background:transparent;pointer-events:none;margin:0;}
.sl-inp::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.15);cursor:pointer;pointer-events:all;}
.sl-inp::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;pointer-events:all;}
.sl-vals{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sl-badge{background:var(--accent);color:#fff;font-family:var(--mono);font-size:13px;font-weight:600;padding:5px 14px;border-radius:20px;}
.tog{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--rl);border:2px solid var(--border);cursor:pointer;transition:all .15s;user-select:none;background:var(--bg3);margin-top:12px;}
.tog.split-on{border-color:var(--text);background:var(--bg4);}
.tog.eu-on{border-color:var(--info);background:var(--info-light);}
.tog-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;background:var(--bg2);}
.tog.split-on .tog-check{background:var(--text);border-color:var(--text);}
.tog.eu-on .tog-check{background:var(--info);border-color:var(--info);}
.tog-main{font-size:13px;font-weight:500;}
.tog-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-search{flex:1;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-search:hover{background:var(--accent-dim);}
.btn-reset{padding:11px 18px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:var(--rl);font-size:13px;font-weight:500;cursor:pointer;}
.btn-reset:hover{background:var(--bg3);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-1px;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.res-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.res-title{font-size:14px;font-weight:600;}
.res-pills{display:flex;gap:5px;flex-wrap:wrap;}
.rpill{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:20px;border:1px solid;}
.rpill.ac{background:var(--accent-light);color:var(--accent);border-color:rgba(212,137,26,.2);}
.rpill.dk{background:var(--text);color:#fff;border-color:var(--text);}
.rpill.eu{background:var(--info-light);color:var(--info);border-color:rgba(0,113,227,.15);}
.rpill.mu{background:var(--bg3);color:var(--text3);border-color:var(--border);}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:16px;box-shadow:var(--sh);}
.filter-bar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--mono);font-size:11px;padding:5px 10px;outline:none;cursor:pointer;}
.fsel.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.filter-reset{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--danger);color:var(--danger);background:var(--danger-light);cursor:pointer;font-family:var(--font);}
.filter-count{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto;}
.match-list{display:flex;flex-direction:column;gap:8px;}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;transition:all .15s;box-shadow:var(--sh);animation:fadeIn .2s ease both;}
.mcard:hover{box-shadow:var(--shl);transform:translateY(-1px);border-color:var(--border2);}
.mcard.has-fu{border-color:rgba(245,158,11,.3);background:linear-gradient(135deg,#fff,#fffdf7);}
.mcard.has-fu:hover{border-color:rgba(245,158,11,.5);}
.mcard-top{display:flex;align-items:center;gap:14px;}
.mavatar{width:38px;height:38px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent);flex-shrink:0;}
.mavatar.fu{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;}
.mbody{flex:1;min-width:0;}
.mname-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mname{font-size:14px;font-weight:600;}
.mmeta{font-size:11px;color:var(--text3);margin-top:2px;}
.mtags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.mtag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:500;}
.mtag.ty{background:var(--accent-light);color:var(--accent);border:1px solid rgba(212,137,26,.2);}
.mtag.sz{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.mtag.rg{background:var(--info-light);color:var(--info);border:1px solid rgba(0,113,227,.15);}
.mtag.ct{background:#f5f0ff;color:#6e3ab0;border:1px solid rgba(110,58,176,.15);}
.mcheck{font-size:20px;color:var(--ok);flex-shrink:0;}
.edit-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.edit-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.edit-btn.del:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-light);}
.cal-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);border:1px solid rgba(212,137,26,.25);font-family:var(--mono);font-size:12px;font-weight:600;}
.cal-chip .x{cursor:pointer;font-weight:700;color:var(--accent-dim);font-size:14px;line-height:1;}
.cal-chip .x:hover{color:var(--danger);}
.shipcal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.shipcal-year{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--text);}
.shipcal-nav{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.shipcal-nav:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.shipcal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.shipcal-m{padding:8px 4px;text-align:center;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;user-select:none;transition:all .12s;}
.shipcal-m:hover{border-color:var(--accent);color:var(--accent);}
.shipcal-m.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.shipcal-sel{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.fu-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}
.fu-panel{margin-top:10px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:10px 12px;}
.fu-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fu-panel-title{font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.4px;}
.fu-panel-count{font-size:10px;font-family:var(--mono);color:#b45309;background:rgba(180,83,9,.1);padding:1px 7px;border-radius:10px;}
.fu-rec{padding:7px 0;border-bottom:1px solid rgba(245,158,11,.15);display:flex;align-items:flex-start;gap:8px;}
.fu-rec:last-child{border-bottom:none;padding-bottom:0;}
.fu-rec-body{flex:1;min-width:0;}
.fu-date{font-size:10px;font-family:var(--mono);color:#b45309;font-weight:600;margin-bottom:4px;}
.fu-details{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.ftag{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:10px;font-weight:500;}
.ftag.sz{background:rgba(180,83,9,.1);color:#92400e;}
.ftag.ty{background:rgba(217,119,6,.15);color:#78350f;}
.ftag.pr{background:rgba(16,185,129,.1);color:#065f46;}
.ftag.tn{background:rgba(59,130,246,.1);color:#1e40af;}
.ftag.sp{background:rgba(139,92,246,.1);color:#5b21b6;}
.fu-comment{font-size:11px;color:#78350f;margin-top:6px;line-height:1.4;font-style:italic;}
.fu-edit-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(180,83,9,.2);background:rgba(180,83,9,.06);color:#b45309;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.fu-edit-btn:hover{background:rgba(180,83,9,.15);}
.fu-more-btn{font-size:11px;color:#b45309;margin-top:6px;font-family:var(--mono);cursor:pointer;text-decoration:underline;display:inline-block;}
.sec-div{display:flex;align-items:center;gap:10px;margin:12px 0 8px;}
.sec-div-lbl{font-size:11px;font-weight:700;font-family:var(--mono);white-space:nowrap;}
.sec-div-line{flex:1;height:1px;background:var(--border);}
.empty{padding:60px 24px;text-align:center;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-title{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;}
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:12px;gap:10px;}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.info-banner{background:var(--accent-light);border:1px solid rgba(212,137,26,.2);border-radius:var(--r);padding:12px 16px;font-size:12px;color:var(--accent-dim);margin-bottom:24px;line-height:1.6;}
.cfg-sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:12px;box-shadow:var(--sh);}
.cfg-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.cfg-desc{font-size:11px;color:var(--text3);margin-bottom:14px;}
.cfg-field{margin-bottom:10px;}
.cfg-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.cfg-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;transition:border-color .15s;}
.cfg-input:focus{border-color:var(--accent);background:var(--bg2);}
.cfg-save{display:flex;justify-content:flex-end;margin-top:10px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none !important;}
.modal{background:var(--bg2);border-radius:var(--rxl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg3);color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.modal-close:hover{background:var(--bg4);}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2);}
.mfield{margin-bottom:14px;}
.mfield-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.mfield-opt{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;}
.minput{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;}
.minput:focus{border-color:var(--accent);background:var(--bg2);}
.mselect{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;cursor:pointer;appearance:none;}
.mselect:focus{border-color:var(--accent);}
.mtextarea{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;resize:vertical;min-height:80px;transition:border-color .15s;}
.mtextarea:focus{border-color:var(--accent);background:var(--bg2);}
.mform-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.company-field{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1.5px solid var(--accent);border-top:none;border-radius:0 0 var(--r) var(--r);box-shadow:var(--shl);z-index:10;max-height:200px;overflow-y:auto;}
.ac-list.hidden{display:none;}
.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background .1s;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.active{background:var(--accent-light);color:var(--accent);}
.ac-sub{font-size:11px;color:var(--text3);margin-top:1px;}
/* EMPRESAS */
.emp-search-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);padding:20px;margin-bottom:20px;box-shadow:var(--sh);}
.emp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:10px;box-shadow:var(--sh);}
.emp-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.emp-name{font-size:15px;font-weight:700;}
.emp-meta{font-size:12px;color:var(--text3);margin-top:2px;}
/* ESTADO / GRADO / BF / OFERTAS */
.mtag.gr{background:#fef9c3;color:#854d0e;border:1px solid rgba(133,77,14,.2);}
.mtag.bf{background:#ecfdf5;color:#047857;border:1px solid rgba(4,120,87,.2);}

.ftag.al{background:rgba(2,132,199,.1);color:#0369a1;}

.active-badge{display:inline-flex;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:var(--ok-light);color:var(--ok);border:1px solid rgba(52,199,89,.3);}
.inactive-badge{display:inline-flex;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);}
.mcard.inactive,.emp-card.inactive{opacity:.55;}
.ofcard.of-disp{border-left:4px solid var(--ok);}
.ofcard.of-def{border-left:4px solid var(--warn);}

/* PROGRESS / TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-weight:500;font-size:12px;z-index:999;transition:opacity .3s;pointer-events:none;box-shadow:var(--shl);opacity:0;}
.pbar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#e2a832);z-index:9999;transform-origin:left;transform:scaleX(0);pointer-events:none;}
.pbar.go{animation:pg 1.5s ease-in-out infinite;}
@keyframes pg{0%{transform:scaleX(0);opacity:1;}60%{transform:scaleX(.7);opacity:1;}100%{transform:scaleX(1);opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.ham{display:none;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:15px;}
.overlay{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.35);}
@media(max-width:768px){
  .ham{display:flex;}
  .sidebar{transform:translateX(-240px);transition:transform .25s ease;z-index:20;}
  .sidebar.open{transform:translateX(0);}
  .overlay.show{display:block;}

  .tog-sub{font-size:12px;}
  .btn-search{padding:14px;font-size:15px;}
  .btn-reset{padding:14px 18px;font-size:14px;}
  .sl-inp::-webkit-slider-thumb{width:26px;height:26px;border-width:3px;}
  .sl-inp::-moz-range-thumb{width:26px;height:26px;border-width:3px;}
  .sl-track{height:8px;}
  .stats-row{grid-template-columns:1fr 1fr;}

  .filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:10px 12px;gap:6px;}

  /* iOS: inputs < 16px trigger auto-zoom on focus */

<script>
// ── OFERTAS ──────────────────────────────────────────────────────────────────
var ofQuery='',ofEstadoF='',ofMode='new',ofEditIdx=null;
var _ofSearchTimer=null;
function debouncedOfSearch(v){clearTimeout(_ofSearchTimer);_ofSearchTimer=setTimeout(function(){ofQuery=v;renderOfertasList();},200);}
function setOfEstado(v){ofEstadoF=(ofEstadoF===v?'':v);renderOfertas();}

function renderOfertas(){
  var banner='';
  if(!tok)banner='<div class="info-banner">🔐 <strong>Conectate con Google</strong> para cargar las ofertas.</div>';
  else if(!availRows.length&&!allRows.length)banner='<div class="info-banner">📋 Conectado. Haz click en <strong>↻ Sincronizar</strong>.</div>';
  // Estado chips from unique values
  var estados=[];var seenE={};
  availRows.forEach(function(r){var e=(r[AV.ESTADO]||'').trim();if(e&&!seenE[e.toLowerCase()]){seenE[e.toLowerCase()]=true;estados.push(e);}});
  var chips=estados.map(function(e){
    return '<span class="chip'+(ofEstadoF.toLowerCase()===e.toLowerCase()?' selected':'')+'" style="padding:5px 12px;font-size:11px;" data-est="'+e.replace(/"/g,'&quot;')+'" onclick="setOfEstado(this.dataset.est)">'+e+'</span>';
  }).join('');
  document.getElementById('content').innerHTML=
    banner+
    '<div class="card" style="margin-bottom:16px;">'+
      '<div class="card-title">📦 Ofertas de proveedores</div>'+
      '<div class="card-sub">Disponibilidad cargada en la hoja Availability.</div>'+
      '<button class="btn-search" onclick="openOfertaModal()">+ Cargar oferta</button>'+
      '<div style="margin-top:14px;">'+
        '<input class="minput" id="of-search" placeholder="Buscar por proveedor, producto, origen..." value="'+ofQuery.replace(/"/g,'&quot;')+'" oninput="debouncedOfSearch(this.value)" autocomplete="off">'+
      '</div>'+
      (chips?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">'+chips+'</div>':'')+
    '</div>'+
    '<div id="ofertas-list"></div>';
  renderOfertasList();
}

function renderOfertasList(){
  var area=document.getElementById('ofertas-list');if(!area)return;
  var q=ofQuery.toLowerCase().trim();
  var rows=availRows.filter(function(r){
    if(ofEstadoF&&(r[AV.ESTADO]||'').trim().toLowerCase()!==ofEstadoF.toLowerCase())return false;
    if(!q)return true;
    var hay=[r[AV.PROV],r[AV.ORIGEN],r[AV.PROD],r[AV.TIPO],r[AV.GRADO],r[AV.CROP],r[AV.ALFA],r[AV.ESTADO],r[AV.OBS],r[AV.NEXT]].join(' ').toLowerCase();
    return hay.indexOf(q)>=0;
  });
  if(!rows.length){
    area.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">'+(availRows.length?'Sin resultados':'Sin ofertas cargadas')+'</div><div class="empty-sub">'+(availRows.length?'Proba con otra busqueda o quita el filtro de estado.':'Carga la primera disponibilidad de un proveedor.')+'</div></div>';
    return;
  }
  var sorted=rows.slice().sort(function(a,b){
    var da=new Date(((a[AV.FECHA]||'').split('/')).reverse().join('-'));
    var db=new Date(((b[AV.FECHA]||'').split('/')).reverse().join('-'));
    return db-da;
  });
  var counter='<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px;">'+rows.length+' de '+availRows.length+' ofertas</div>';
  area.innerHTML=counter+'<div class="match-list">'+sorted.map(function(r){
    var prov=(r[AV.PROV]||'').trim();
    var origen=(r[AV.ORIGEN]||'').trim();
    var prod=(r[AV.PROD]||'').trim();
    var tipo=(r[AV.TIPO]||'').trim();
    var grado=(r[AV.GRADO]||'').trim();
    var crop=(r[AV.CROP]||'').trim();
    var tns=(r[AV.TNS]||'').trim();
    var alfa=(r[AV.ALFA]||'').trim();
    var estado=(r[AV.ESTADO]||'').trim();
    var fecha=(r[AV.FECHA]||'').trim();
    var obs=(r[AV.OBS]||'').trim();
    var next=(r[AV.NEXT]||'').trim();
    var eLow=estado.toLowerCase();

var availGid=null;

async function appendOfertaRow(row){

  var gid=await getAvailGid();
  if(gid===null||gid===undefined){
    var url='https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+encodeURIComponent('Availability!A:L')+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
    var rr=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({values:[row]})});
    return rr.ok;
  }
  var r1=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+':batchUpdate',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({requests:[{insertDimension:{range:{sheetId:gid,dimension:'ROWS',startIndex:1,endIndex:2},inheritFromBefore:false}}]})});
  if(!r1.ok)return false;
  var r2=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+encodeURIComponent('Availability!A2:L2')+'?valueInputOption=USER_ENTERED',{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({values:[row]})});

}
async function updateOfertaRow(sheetRow,row){
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+'/values/'+encodeURIComponent('Availability!A'+sheetRow+':L'+sheetRow)+'?valueInputOption=USER_ENTERED';
  var r=await fetch(url,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({values:[row]})});
  return r.ok;
}
async function deleteOfertaRow(sheetRow){
  var gid=await getAvailGid();
  if(gid===null||gid===undefined)return false;
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+cfg.sheetId+':batchUpdate',{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:gid,dimension:'ROWS',startIndex:sheetRow-1,endIndex:sheetRow}}}]})});
  return r.ok;
}
async function deleteOferta(idx){
  var r=availRows[idx];
  if(!r)return;
  if(!tok){toast('Conectate con Google primero');return;}
  var shRow=r._sheetRow;
  if(!shRow){toast('Sincroniza antes de eliminar esta oferta');return;}
  var prov=(r[AV.PROV]||'').trim();
  if(!confirm('¿Eliminar la oferta de '+prov+'? Esto borra la fila del Sheet y no se puede deshacer.'))return;
  prog(true);
  var okDel=await deleteOfertaRow(shRow);
  prog(false);
  if(okDel){
    availRows.splice(idx,1);
    availRows.forEach(function(x){if(x._sheetRow&&x._sheetRow>shRow)x._sheetRow--;});
    toast('✓ Oferta eliminada');
    renderOfertasList();
  } else {
    toast('Error al eliminar la oferta');
  }
}
async function saveOferta(){
  if(!tok){toast('Conectate con Google primero');return;}
  var prov=document.getElementById('of-prov').value.trim();
  if(!prov){toast('Ingresa el proveedor');return;}
  var prevNext='';
  if(ofMode==='edit'&&ofEditIdx!==null&&availRows[ofEditIdx])prevNext=(availRows[ofEditIdx][AV.NEXT]||'');
  var row=[prov,
    document.getElementById('of-origen').value.trim(),
    document.getElementById('of-prod').value.trim(),
    document.getElementById('of-tipo').value.trim(),
    document.getElementById('of-grado').value.trim(),
    document.getElementById('of-crop').value.trim(),
    document.getElementById('of-tns').value.trim(),
    document.getElementById('of-alfa').value.trim(),
    document.getElementById('of-estado').value.trim(),
    todayStr(),
    document.getElementById('of-obs').value.trim(),
    prevNext];
  var btn=document.getElementById('of-save-btn');
  btn.textContent='Guardando...';btn.disabled=true;
  var ok=false;
  if(ofMode==='edit'&&ofEditIdx!==null){
    var shRow=availRows[ofEditIdx]&&availRows[ofEditIdx]._sheetRow;
    if(!shRow){btn.textContent='💾 Guardar';btn.disabled=false;toast('Sincroniza antes de editar esta oferta');return;}
    ok=await updateOfertaRow(shRow,row);
    if(ok){row._sheetRow=shRow;availRows[ofEditIdx]=row;toast('✓ Oferta actualizada');}
  } else {
    ok=await appendOfertaRow(row);
    if(ok){
      availRows.forEach(function(r){if(r._sheetRow)r._sheetRow++;});
      row._sheetRow=2;
      availRows.unshift(row);
      toast('✓ Oferta guardada');
    }
  }
  btn.textContent='💾 Guardar';btn.disabled=false;
  if(ok){closeOfertaModal();if(view==='ofertas')renderOfertas();}
  else toast('Error al guardar en el Sheet');
}

function findSimilarCompany(name){
  if(!name)return null;
  var nLow=name.toLowerCase().trim();
  var names=getCompanyNames();
  var best=null,bestScore=0;
  for(var i=0;i<names.length;i++){
    var s=sim(names[i].toLowerCase(),nLow);
    if(s>=0.7&&s>bestScore){best=names[i];bestScore=s;}
  }
  return best;
}

}

function renderDemandasList(){
  var area=document.getElementById('demandas-list');if(!area)return;
  var q=demQuery.toLowerCase().trim();
  var rows=fuRows.filter(function(r){
    if(!q)return true;
    var hay=[r[FU.CUSTOMER],r[FU.SIZE],r[FU.TYPE],r[FU.TNS],r[FU.PRICE],r[FU.SUPPLIER],r[FU.BUYSFROM],r[FU.OBS],r[FU.GRADO],r[FU.ALFA]].join(' ').toLowerCase();
    return hay.indexOf(q)>=0;
  });
  if(!rows.length){
    area.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">'+(fuRows.length?'Sin resultados':'Sin demandas cargadas')+'</div><div class="empty-sub">'+(fuRows.length?'Proba con otra busqueda.':'Carga la primera demanda de un cliente.')+'</div></div>';
    return;
  }
  var sorted=rows.slice().sort(function(a,b){
    var da=new Date(((a[0]||'').split('/')).reverse().join('-'));
    var db=new Date(((b[0]||'').split('/')).reverse().join('-'));
    return demSort==='asc'?(da-db):(db-da);

// ── TYPE MAP ────────────────────────────────────────────────────────────────
// Canonical peanut types (column AD): Raw, Blanched, Roasted, In shell, BF. Multiple separated by ";".
function classifyTypeToken(seg){
  var k=(seg||'').toLowerCase().trim();var out=[];
  if(k.indexOf('in shell')>=0||k.indexOf('inshell')>=0||k.indexOf('cascara')>=0||k.indexOf('cáscara')>=0||k.indexOf('shell')>=0)out.push('In shell');
  if(k.indexOf('roast')>=0||k.indexOf('tost')>=0||k.indexOf('horn')>=0)out.push('Roasted');
  if(k.indexOf('blanch')>=0||k.indexOf('blanc')>=0)out.push('Blanched');
  if(k.indexOf('raw')>=0||k.indexOf('crudo')>=0)out.push('Raw');
  return out;
}
function getTypes(raw){
  var s=(raw||'').toLowerCase();
  var t=[];
  var segs=s.split(';');
  for(var i=0;i<segs.length;i++){classifyTypeToken(segs[i]).forEach(function(x){if(t.indexOf(x)<0)t.push(x);});}
  // fallback: also scan whole string (handles comma/space separated legacy values)
  if(!t.length)classifyTypeToken(s).forEach(function(x){if(t.indexOf(x)<0)t.push(x);});
  return t;
}

// ── SIZE ────────────────────────────────────────────────────────────────────
function isAnyToken(s){return s.indexOf('any')>=0||s.indexOf('todo')>=0||s.indexOf('todos')>=0||s.indexOf('all')>=0||s.indexOf('runner')>=0||s.indexOf('wholes')>=0||s.indexOf('sortex')>=0||s.indexOf('chopped')>=0||s.indexOf('pasta')>=0||s.indexOf('small')>=0||s.indexOf('calibres medianos')>=0||s.indexOf('principalmente')>=0||s.indexOf('cualquier')>=0;}
// Parse a size string. Calibers are separated by ";" (e.g. "38/42; 40/50; 60/70").
// Each segment is treated as its own caliber: a min/max range, a single number, Split, or Any.
function parseSize(raw){
  var s=(raw||'').toLowerCase();
  var sp=s.indexOf('split')>=0;
  var any=isAnyToken(s);
  var ranges=[]; // array of [min,max] pairs, one per caliber segment
  var nums=[];   // flat list of all numbers (kept for compatibility)
  var segs=s.split(';');
  for(var si=0;si<segs.length;si++){
    var seg=segs[si].trim();
    if(!seg)continue;
    var segNums=[];
    var ms=seg.match(/[0-9]+/g);
    if(ms)for(var i=0;i<ms.length;i++){var v=parseInt(ms[i]);if(v>=20&&v<=120){segNums.push(v);nums.push(v);}}
    if(segNums.length>=2){
      segNums.sort(function(a,b){return a-b;});
      ranges.push([segNums[0],segNums[segNums.length-1]]);
    } else if(segNums.length===1){
      ranges.push([segNums[0],segNums[0]]);
    }
  }
  return{nums:nums,ranges:ranges,hasSplit:sp,hasAny:any};
}
// A DB size matches the searched [mn,mx] window only if AT LEAST ONE of its calibers
// is fully CONTAINED within the window (both ends inside [mn,mx]).
// Example: search 40-50 -> "40/50" matches; "38/42" does NOT (38<40); "60/70" does NOT.
function sizeOk(raw,mn,mx,ws){
  var p=parseSize(raw);
  if(p.hasAny)return true;
  if(p.hasSplit&&ws)return true;
  for(var i=0;i<p.ranges.length;i++){
    var lo=p.ranges[i][0],hi=p.ranges[i][1];
    if(lo>=mn&&hi<=mx)return true;
  }
  return false;
}

// ── FU NORMALIZERS ──────────────────────────────────────────────────────────
function normType(raw){var s=(raw||'').toLowerCase().trim();if(!s)return '';if(s.indexOf('roast')>=0||s.indexOf('tost')>=0||s.indexOf('horn')>=0)return 'Roasted';if(s.indexOf('blanch')>=0||s.indexOf('blanc')>=0)return 'Blanched';if(s.indexOf('raw')>=0||s.indexOf('crudo')>=0)return 'Raw';return raw;}
// Display normalization: keep each caliber segment, format as ##/## joined by " · ".
function normSize(raw){
  var s=(raw||'').trim();
  if(!s)return '';
  var low=s.toLowerCase();
  var AK=['all','todos','small sizes','wholes','wholes and splits','sortex reject','sortex','chopped','pasta','2 - 4 mm','2-4mm'];
  var isAnyOnly=low==='any'||low==='todos'||low==='all';
  var parts=[];
  var hasSplit=low.indexOf('split')>=0;
  var hasAny=false;
  var segs=s.split(';');
  for(var si=0;si<segs.length;si++){
    var seg=segs[si].trim();if(!seg)continue;
    var segLow=seg.toLowerCase();
    var anySeg=false;
    for(var k=0;k<AK.length;k++){if(segLow===AK[k]||segLow.indexOf(AK[k])>=0){anySeg=true;break;}}
    if(anySeg||isAnyToken(segLow)){hasAny=true;continue;}
    var nums=[];var ms=seg.match(/[0-9]+/g);
    if(ms)for(var i=0;i<ms.length;i++){var v=parseInt(ms[i]);if(v>=20&&v<=120)nums.push(v);}
    if(nums.length>=2){nums.sort(function(a,b){return a-b;});parts.push(nums[0]+'/'+nums[nums.length-1]);}
    else if(nums.length===1){parts.push(nums[0]+'');}
  }
  if(hasSplit)parts.push('Split');
  if(hasAny&&!parts.length)return 'Any';
  if(hasAny)parts.push('Any');
  return parts.length?parts.join(' \u00b7 '):raw;
}
// Canonical caliber format for WRITING to the sheet: "##/##; ##/##; Split" separated by "; ".
function canonSizeForSheet(raw){
  var s=(raw||'').trim();
  if(!s)return '';
  var out=[];
  var hasSplit=s.toLowerCase().indexOf('split')>=0;
  // Accept segments separated by ; , or " y "
  var segs=s.replace(/\band\b/gi,';').replace(/\by\b/gi,';').split(/[;,]/);
  for(var si=0;si<segs.length;si++){
    var seg=segs[si].trim();if(!seg)continue;
    if(seg.toLowerCase().indexOf('split')>=0)continue;
    if(isAnyToken(seg.toLowerCase())){out.push('Any');continue;}
    var nums=[];var ms=seg.match(/[0-9]+/g);
    if(ms)for(var i=0;i<ms.length;i++){var v=parseInt(ms[i]);if(v>=20&&v<=120)nums.push(v);}
    if(nums.length>=2){nums.sort(function(a,b){return a-b;});out.push(nums[0]+'/'+nums[nums.length-1]);}
    else if(nums.length===1)out.push(nums[0]+'');
  }
  if(hasSplit)out.push('Split');
  return out.length?out.join('; '):s;
}
// Canonical type format for the sheet (Raw/Blanched/Roasted, preserving BF marker).
function canonTypeForSheet(raw){
  var s=(raw||'').trim();
  if(!s)return '';
  var low=s.toLowerCase();
  var t=getTypes(s); // Raw/Blanched/Roasted/In shell in canonical form
  var out=t.slice();
  if(/\bbf\b/.test(low)&&out.map(function(x){return x.toLowerCase();}).indexOf('bf')<0)out.push('BF');
  return out.length?out.join('; '):s;
}

// ── SIMILARITY ──────────────────────────────────────────────────────────────
function sim(a,b){a=(a||'').toLowerCase().trim().replace(/[^a-z0-9]/g,' ').replace(/ +/g,' ');b=(b||'').toLowerCase().trim().replace(/[^a-z0-9]/g,' ').replace(/ +/g,' ');if(a===b)return 1;if(!a||!b)return 0;var m=a.length,n=b.length,dp=[],i,j;for(i=0;i<=m;i++){dp[i]=[];for(j=0;j<=n;j++)dp[i][j]=i===0?j:j===0?i:0;}for(i=1;i<=m;i++)for(j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return 1-dp[m][n]/Math.max(m,n);}

function findFU(company){

}

var SHIP_MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var SHIP_ABBR=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var fuShipSel=[];        // selected months as {m:'Marzo', y:2026}
var fuShipYear=(new Date()).getFullYear(); // year currently shown in the calendar
function shipKey(m,y){return m+' '+y;}
function isShipOn(m,y){return fuShipSel.some(function(s){return s.m===m&&s.y===y;});}
function renderShipCal(){
  var box=document.getElementById('fu-ship-cal');if(!box)return;
  var grid=SHIP_MONTHS.map(function(m,i){
    var on=isShipOn(m,fuShipYear);
    return '<div class="shipcal-m'+(on?' on':'')+'" data-m="'+m+'" onclick="toggleShipMonth(this.dataset.m)">'+SHIP_ABBR[i]+'</div>';
  }).join('');
  // selected summary (all years), sorted chronologically
  var sel=fuShipSel.slice().sort(function(a,b){return a.y-b.y||SHIP_MONTHS.indexOf(a.m)-SHIP_MONTHS.indexOf(b.m);});
  var selHtml=sel.length?'<div class="shipcal-sel">'+sel.map(function(s){
    return '<span class="cal-chip">'+s.m.slice(0,3)+' '+s.y+'<span class="x" data-m="'+s.m+'" data-y="'+s.y+'" onclick="removeShipMonth(this.dataset.m,parseInt(this.dataset.y))">×</span></span>';
  }).join('')+'</div>':'';
  box.innerHTML=
    '<div class="shipcal-head">'+
      '<span class="shipcal-nav" onclick="shipYearShift(-1)">‹</span>'+
      '<span class="shipcal-year">'+fuShipYear+'</span>'+

    '</div>'+
    '<div class="shipcal-grid">'+grid+'</div>'+

}
function shipYearShift(d){fuShipYear+=d;renderShipCal();}
function toggleShipMonth(m){
  var i=-1;
  for(var k=0;k<fuShipSel.length;k++){if(fuShipSel[k].m===m&&fuShipSel[k].y===fuShipYear){i=k;break;}}
  if(i>=0)fuShipSel.splice(i,1);else fuShipSel.push({m:m,y:fuShipYear});
  renderShipCal();
}
function removeShipMonth(m,y){
  fuShipSel=fuShipSel.filter(function(s){return !(s.m===m&&s.y===y);});
  renderShipCal();
}
// Combine selected months (chronological) with free text into one string
function buildShipmentValue(){
  var sel=fuShipSel.slice().sort(function(a,b){return a.y-b.y||SHIP_MONTHS.indexOf(a.m)-SHIP_MONTHS.indexOf(b.m);});
  var monthsStr=sel.map(function(s){return s.m+' '+s.y;}).join(', ');
  var free=document.getElementById('fu-shipment').value.trim();
  var parts=[];
  if(monthsStr)parts.push(monthsStr);
  if(free)parts.push(free);
  return parts.join(' · ');
}
// Split an existing shipment string back into selected month/year pairs + leftover free text
function parseShipmentValue(s){
  fuShipSel=[];
  s=(s||'').trim();
  var free=s;
  SHIP_MONTHS.forEach(function(m){
    // match "Marzo 2026" (with year) or bare "Marzo" (assume current shown year)
    var reY=new RegExp(m+'\\s+(20\\d\\d)','i');
    var mm;
    while((mm=reY.exec(free))!==null){
      fuShipSel.push({m:m,y:parseInt(mm[1])});
      free=free.replace(mm[0],'');
      reY.lastIndex=0;
    }
    var reBare=new RegExp('\\b'+m+'\\b','i');
    if(reBare.test(free)){fuShipSel.push({m:m,y:fuShipYear});free=free.replace(reBare,'');}
  });
  free=free.replace(/^[\s,·]+|[\s,·]+$/g,'').replace(/[,·]\s*[,·]/g,',').replace(/\s{2,}/g,' ').replace(/^[\s,·]+|[\s,·]+$/g,'').trim();
  return free;
}

async function saveFURecord(){
  if(!tok){toast('Conectate con Google primero');return;}
  var company=document.getElementById('fu-company').value.trim();
  if(!company){toast('Ingresa el nombre de la empresa');return;}
  var size=fuCalibers.join('; ');

  var shipment=buildShipmentValue();
  var grado=document.getElementById('fu-grado').value.trim();
  var alfa=document.getElementById('fu-alfa').value.trim();
  // Build a 21-column row (A..U) respecting the Follow up sheet layout
  var rowData=new Array(21).fill('');
  rowData[FU.DATE]=todayStr();
  rowData[FU.CUSTOMER]=company;
  rowData[FU.SIZE]=size;
  rowData[FU.TYPE]=type;
  rowData[FU.TNS]=tns;
  rowData[FU.PRICE]=price;
  rowData[FU.BUYSFROM]=supplier;
  rowData[FU.PORT]=port;
  rowData[FU.COUNTRY]=country;
  rowData[FU.SHIPMENT]=shipment;
  rowData[FU.OBS]=comment;
  rowData[FU.GRADO]=grado;
  rowData[FU.ALFA]=alfa;
  var btn=document.getElementById('fu-save-btn');
  btn.textContent='Guardando...';btn.disabled=true;
  var ok=false;
  if(fuMode==='edit'&&fuEditIdx!==null){
    var prev=fuRows[fuEditIdx]||[];
    // keep columns not present in the form so we don't wipe them
    [FU.CONTACT,FU.ORIGIN,FU.PACKAGING,FU.SUPPLIER,FU.TEAMM,FU.CONTRATO,FU.DIAS,FU.ESTADO].forEach(function(ix){
      if((prev[ix]||'')!=='')rowData[ix]=prev[ix];
    });
    var shRow=fuRows[fuEditIdx]._sheetRow||(fuEditIdx+2);
    ok=await updateFURow(shRow,rowData);
    if(ok){rowData._sheetRow=shRow;fuRows[fuEditIdx]=rowData;toast('✓ Follow Up actualizado');}
  } else {
    ok=await appendFURow(rowData);
    if(ok){
      fuRows.forEach(function(r){if(r._sheetRow)r._sheetRow++;});
      rowData._sheetRow=2;
      fuRows.unshift(rowData);toast('✓ Follow Up guardado');
    }
  }
  btn.textContent='💾 Guardar';btn.disabled=false;
  if(ok){
    closeFUModal();
    if(view==='matcher'&&lastSearch){lastSearch.results=getMatches();renderResults();}
    else if(view==='empresas')renderEmpresas();
    else if(view==='demandas')renderDemandas();
  } else {toast('Error al guardar en el Sheet');}
}

// ── MATCH ─────────────────────────────────────────────────────────────────────
function getMatches(){
  var types=[];selTypes.forEach(function(t){types.push(t.toLowerCase());});
  var results=[];
  allRows.forEach(function(row){
    if(!withEU&&isEU(row[COL.REGION]||''))return;
    var canon=getTypes(row[COL.TYPE]||'').map(function(t){return t.toLowerCase();});
    var typeOk=types.length===0||types.some(function(t){return canon.indexOf(t)>=0;});
    if(!typeOk)return;
    var dbSize=(row[COL.SIZE]||'').trim();
    var szOk;
    if(soloSplit){
      szOk=parseSize(dbSize).hasSplit||parseSize(dbSize).hasAny;
      if(!szOk&&!dbSize){
        var co0=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
        var fuRecs0=findFU(co0);
        for(var i=0;i<fuRecs0.length;i++){var p0=parseSize((fuRecs0[i][3]||'').trim());if(p0.hasSplit||p0.hasAny){szOk=true;break;}}
      }
    } else {
      szOk=sizeOk(dbSize,rMin,rMax,withSplit);
      // Fallback: if DB has no size, check FU records
      if(!szOk&&!dbSize){
        var co=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
        var fuRecs=findFU(co);
        for(var i=0;i<fuRecs.length;i++){if(sizeOk((fuRecs[i][3]||'').trim(),rMin,rMax,withSplit)){szOk=true;break;}}
      }
    }
    if(!szOk)return;
    if(withBF&&!isBF(row))return;
    var company=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
    var fu=findFU(company);
    var eu=isEU(row[COL.REGION]||'');
    var pri;
    if(withEU){if(eu&&fu.length)pri=0;else if(fu.length)pri=1;else if(eu)pri=2;else pri=3;}
    else{pri=fu.length?0:1;}
    results.push({client:(row[COL.CLIENT]||'').trim(),region:(row[COL.REGION]||'').trim(),country:(row[COL.COUNTRY]||'').trim(),company:company,size:dbSize,type:(row[COL.TYPE]||'').trim(),types:getTypes(row[COL.TYPE]||''),szInfo:parseSize(dbSize),fu:fu,hasFU:fu.length>0,isEu:eu,pri:pri,estado:(row[COL.ESTADO]||'').trim(),inactive:isInactive(row),grado:(row[COL.GRADO]||'').trim(),bf:isBF(row)});
  });
  return results.sort(function(a,b){return a.pri-b.pri;});
}

var fuPanelCounter=0;
function buildFURec(row){
  var date=(row[0]||'').trim();
  var sz=normSize((row[FU.SIZE]||'').trim());
  var ty=normType((row[FU.TYPE]||'').trim());
  var tns=(row[FU.TNS]||'').trim(),price=(row[FU.PRICE]||'').trim(),sp=(row[FU.BUYSFROM]||row[FU.SUPPLIER]||'').trim(),cm=(row[FU.OBS]||'').trim();
  var gr=(row[FU.GRADO]||'').trim(),al=(row[FU.ALFA]||'').trim();
  var rowIdx=fuRows.indexOf(row);
  var editBtn=rowIdx>=0?'<span class="fu-edit-btn" onclick="openFUModal(\'\','+rowIdx+')" title="Editar">✏️</span>':'';
  return '<div class="fu-rec">'+
    '<div class="fu-rec-body">'+
      '<div class="fu-date">'+(date||'—')+'</div>'+
      '<div class="fu-details">'+
        (sz&&sz!=='—'?'<span class="ftag sz">'+sz+'</span>':'')+
        (ty&&ty!=='—'?'<span class="ftag ty">'+ty+'</span>':'')+
        (tns?'<span class="ftag tn">'+tns+' tn</span>':'')+
        (price?'<span class="ftag pr">USD '+price+'</span>':'')+
        (sp?'<span class="ftag sp">🏭 '+sp+'</span>':'')+
        (gr?'<span class="ftag gr">Grado '+gr+'</span>':'')+
        (al?'<span class="ftag al">'+al+'</span>':'')+
      '</div>'+
      (cm?'<div class="fu-comment">"'+cm+'"</div>':'')+
    '</div>'+
    editBtn+
  '</div>';
}

function buildFUPanel(fuRecords){
  if(!fuRecords||!fuRecords.length)return '';
  var sorted=fuRecords.slice().sort(function(a,b){
    var da=new Date((a[0]||'').split('/').reverse().join('-'));
    var db=new Date((b[0]||'').split('/').reverse().join('-'));
    return db-da;
  });
  fuPanelCounter++;
  var pid='fup'+fuPanelCounter;
  var preview=sorted.slice(0,3);
  var rest=sorted.slice(3);
  var previewHtml=preview.map(buildFURec).join('');
  var restHtml=rest.length?rest.map(buildFURec).join(''):'';
  var moreHtml='';
  if(rest.length){
    moreHtml='<div id="more-'+pid+'" class="fu-more-btn" onclick="toggleFUPanel(\''+pid+'\')">▼ Ver '+rest.length+' registro'+(rest.length>1?'s':'')+' mas</div>'+
      '<div id="rest-'+pid+'" style="display:none;">'+restHtml+
        '<div class="fu-more-btn" onclick="toggleFUPanel(\''+pid+'\')">▲ Ocultar</div>'+
      '</div>';
  }
  return '<div class="fu-panel">'+
    '<div class="fu-panel-header">'+
      '<span class="fu-panel-title">📋 Follow Up</span>'+
      '<span class="fu-panel-count">'+fuRecords.length+' registro'+(fuRecords.length>1?'s':'')+'</span>'+
    '</div>'+
    previewHtml+moreHtml+
  '</div>';
}

function toggleFUPanel(pid){
  var rest=document.getElementById('rest-'+pid);
  var more=document.getElementById('more-'+pid);
  if(!rest||!more)return;
  var hidden=rest.style.display==='none';
  rest.style.display=hidden?'block':'none';
  more.style.display=hidden?'none':'block';
}

function dedupeNames(dbNames,fuNames){
  var seen={};var out=[];
  dbNames.forEach(function(n){var k=n.toLowerCase().trim();if(!seen[k]){seen[k]=n;out.push(n);}});
  fuNames.forEach(function(n){
    var k=n.toLowerCase().trim();if(seen[k])return;
    var isSim=false;
    for(var s in seen){if(s.indexOf(k)>=0||k.indexOf(s)>=0||sim(s,k)>=0.7){isSim=true;break;}}
    if(!isSim){seen[k]=n;out.push(n);}
  });
  return out.sort();
}

function debouncedEmpSearch(val){
  empQuery=val;

function clearEmpTeamFilter(){empTeamFilter=[];renderEmpresas();}
function renderEmpResults(){
  var area=document.getElementById('emp-results');if(!area)return;
  var query=(empQuery||'').trim();
  var qLow=query.toLowerCase();
  // Start from ALL database rows
  var dbMatches=allRows.slice();
  // Text search (name, country, region)
  if(qLow){
    dbMatches=dbMatches.filter(function(r){
      var hay=[(r[COL.COMPANY]||''),(r[COL.CLIENT]||''),(r[COL.COUNTRY]||''),(r[COL.REGION]||'')].join(' ').toLowerCase();
      var n=(r[COL.COMPANY]||r[COL.CLIENT]||'').trim();
      return hay.indexOf(qLow)>=0||sim(n.toLowerCase(),qLow)>=0.6;
    });
  }
  // Team filter (multi-select: company shows if it has ANY of the selected commercials)
  if(empTeamFilter.length){
    dbMatches=dbMatches.filter(function(r){
      var tm=parseTeam(r[COL.TEAM]);
      return empTeamFilter.some(function(t){return tm.indexOf(t)>=0;});
    });
  }
  // FU-only companies: only relevant when there's a text query and no team filter
  var fuByKey={};
  if(qLow&&!empTeamFilter.length){
    var fuMatches=fuRows.filter(function(r){var n=(r[1]||'').trim().toLowerCase();return n.indexOf(qLow)>=0||qLow.indexOf(n)>=0||sim(n,qLow)>=0.7;});
    fuMatches.forEach(function(r){var k=(r[1]||'').trim().toLowerCase();if(!fuByKey[k])fuByKey[k]=[];fuByKey[k].push(r);});
  }
  // Sort alphabetically by company name
  dbMatches.sort(function(a,b){
    var na=(a[COL.COMPANY]||a[COL.CLIENT]||'').toLowerCase();
    var nb=(b[COL.COMPANY]||b[COL.CLIENT]||'').toLowerCase();
    return na<nb?-1:na>nb?1:0;
  });
  var totalShown=dbMatches.length+Object.keys(fuByKey).length;
  if(!totalShown){
    area.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><div class="empty-title">Sin resultados</div><div class="empty-sub">'+((query||empTeamFilter.length)?'Proba con otra busqueda o quita los filtros.':'No hay empresas cargadas.')+'</div></div>';
    return;
  }
  var counter='<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;">'+dbMatches.length+' empresa'+(dbMatches.length!==1?'s':'')+(allRows.length&&(query||empTeamFilter.length)?' de '+allRows.length:'')+'</div>';
  var html=counter;
  if(dbMatches.length){
    dbMatches.forEach(function(row){
      var company=(row[COL.COMPANY]||row[COL.CLIENT]||'').trim();
      var meta=[row[COL.COUNTRY],row[COL.REGION]].filter(Boolean).join(' · ');
      var dbTypes=getTypes(row[COL.TYPE]||'');
      var dbSize=(row[COL.SIZE]||'').trim();
      var fu=findFU(company);
      var estadoVal=(row[COL.ESTADO]||'').trim();
      var inact=isInactive(row);
      var gradoVal=(row[COL.GRADO]||'').trim();
      var teamArr=parseTeam(row[COL.TEAM]);
      var shRow=row._sheetRow||0;
      html+='<div class="emp-card'+(inact?' inactive':'')+'">'+
        '<div class="emp-card-header">'+
          '<div><div class="emp-name">'+company+' '+(estadoVal?(inact?'<span class="inactive-badge">Inactivo</span>':'<span class="active-badge">Activo</span>'):'')+'</div>'+(meta?'<div class="emp-meta">'+meta+'</div>':'')+' </div>'+
          '<button class="btn primary" style="font-size:12px;padding:6px 12px;" data-company="'+company.replace(/"/g,'&quot;')+'" onclick="openFUModal(this.dataset.company)">+ Follow Up</button>'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">'+
          dbTypes.map(function(t){return '<span class="mtag ty">'+t+'</span>';}).join('')+
          (dbSize?'<span class="mtag sz">'+dbSize+'</span>':'')+
          (gradoVal?'<span class="mtag gr">Grado '+gradoVal+'</span>':'')+
          (isBF(row)?'<span class="mtag bf">🐦 BF</span>':'')+
          (teamArr.length?'<span class="mtag team">👤 '+teamArr.join(' - ')+'</span>':'')+
          (shRow?'<span class="fu-edit-btn" data-row="'+shRow+'" data-team="'+teamArr.join('-')+'" onclick="openTeamEdit(this.dataset.row,this.dataset.team)" title="Editar comercial" style="width:26px;height:26px;">👤</span>':'')+
        '</div>'+
        (fu.length?buildFUPanel(fu):'<div style="font-size:12px;color:var(--text3);padding:8px 0;">Sin registros de Follow Up aun.</div>')+
      '</div>';
    });
  }
  // FU-only companies (not in Database) - only when searching by text
  Object.keys(fuByKey).forEach(function(k){
    // skip if already shown as a DB company
    var inDb=dbMatches.some(function(r){return (r[COL.COMPANY]||r[COL.CLIENT]||'').trim().toLowerCase()===k;});
    if(inDb)return;
    var fu=fuByKey[k];
    var displayName=fu[0][1].trim();
    html+='<div class="emp-card">'+
      '<div class="emp-card-header">'+
        '<div><div class="emp-name">'+displayName+'</div><div class="emp-meta" style="color:var(--warn);">Solo en Follow Up</div></div>'+
        '<button class="btn primary" style="font-size:12px;padding:6px 12px;" data-company="'+displayName.replace(/"/g,'&quot;')+'" onclick="openFUModal(this.dataset.company)">+ Follow Up</button>'+
      '</div>'+
      buildFUPanel(fu)+
    '</div>';
  });
  area.innerHTML=html;
}

    '</div>';

function saveConfig(){
  cfg.clientId=document.getElementById('cfg-clientId').value.trim()||cfg.clientId;
  cfg.sheetId=document.getElementById('cfg-sheetId').value.trim()||cfg.sheetId;
  cfg.sheetName=document.getElementById('cfg-sheetName').value.trim()||cfg.sheetName;
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  initGoogleAuth();toast('Configuracion guardada');
  setTimeout(function(){showView('matcher');},800);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},2800);}
function prog(on){document.getElementById('pbar').classList.toggle('go',on);}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

window.onload=function(){
  if(cfg.clientId)initGoogleAuth();
  renderMatcher();
  setStatus('err',cfg.clientId?'Sin autenticar':'Sin configurar');
};
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
